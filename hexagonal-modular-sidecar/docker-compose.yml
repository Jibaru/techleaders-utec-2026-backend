# Full sidecar stack: postgres + redis + kafka + the API + a dedicated
# mailworker that consumes mail messages from Kafka and delivers them via SMTP.
#
#   docker compose up --build
#
# The API is reachable on http://localhost:8080. The mailworker reads from
# kafka:9092 and (if SMTP_HOST is set) sends real emails; otherwise it just
# logs the payloads.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffee_loyalty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d coffee_loyalty"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnami/kafka:3.7
    ports:
      - "9092:9092"
    environment:
      # KRaft mode — no Zookeeper.
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  api:
    build:
      context: .
      target: api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      HTTP_PORT: "8080"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: coffee_loyalty
      DB_SSLMODE: disable
      REDIS_ADDR: redis:6379
      KAFKA_BROKERS: kafka:9092
      KAFKA_MAIL_TOPIC: mail.outbox
      MAIL_FROM: coffee-loyalty@example.com

  mailworker:
    build:
      context: .
      target: mailworker
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      # mailworker only reads Kafka + sends SMTP. It doesn't need DB / Redis.
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: coffee_loyalty
      KAFKA_BROKERS: kafka:9092
      KAFKA_MAIL_TOPIC: mail.outbox
      # Leave SMTP_HOST empty to just log payloads. Fill in to actually deliver.
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASSWORD: ""
      MAIL_FROM: coffee-loyalty@example.com

volumes:
  postgres_data:
